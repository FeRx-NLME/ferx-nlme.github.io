project:
  type: website
  output-dir: _site
  resources:
    - articles/**

brand: _brand.yml

website:
  title: "ferx"
  description: "Fast nonlinear mixed effects modeling with a Rust backend"
  favicon: assets/ferx-favicon.svg
  site-url: https://ferx-nlme.github.io
  repo-url: https://github.com/FeRx-NLME/ferx-r
  repo-actions: [issue]

  navbar:
    logo: assets/ferx-dsl-brackets.svg
    logo-dark: assets/ferx-dsl-brackets-dark.svg
    logo-alt: "ferx"
    left:
      - text: "Get started"
        href: get-started.qmd
      - text: "Features"
        href: features.qmd
      - text: "Reference"
        href: reference/index.qmd
      - text: "Changelog"
        href: changelog.qmd
      - text: "Roadmap"
        href: roadmap.qmd
    right:
      - text: "ferx-r"
        href: https://ferx-nlme.github.io/ferx-book/
      - text: "ferx-core"
        href: https://ferx-nlme.github.io/ferx-core/
      - icon: github
        href: https://github.com/FeRx-NLME
        aria-label: GitHub

  page-footer:
    background: light
    border: true
    left: "© 2026 FeRx-NLME · MIT licensed"
    right: "Fe · 26 · Rx · 2026"

format:
  html:
    theme:
      light: [cosmo, assets/ferx.scss]
      dark: [cosmo, assets/ferx-dark.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    code-link: true
    code-copy: true
    code-overflow: wrap
    highlight-style:
      light: github
      dark: github-dark
    mainfont: "IBM Plex Sans"
    monofont: "JetBrains Mono"
