project:
  type: website
  output-dir: _site

brand: _brand.yml

website:
  title: "ferx"
  description: "Fast nonlinear mixed effects modeling with a Rust backend"
  favicon: assets/ferx-favicon.svg
  site-url: https://ferx-nlme.github.io
  repo-url: https://github.com/FeRx-NLME/ferx-r
  repo-actions: [issue]

  navbar:
    logo: assets/ferx-dsl-brackets.svg
    logo-alt: "ferx"
    background: "#F7F6F3"
    foreground: "#1A2332"
    left:
      - text: "Get started"
        href: get-started.qmd
      - text: "Learn"
        menu:
          - text: "Model workflow"
            href: learn/model-workflow.qmd
          - text: "Model editing"
            href: learn/model-editing.qmd
          - text: "Parameter transforms"
            href: learn/parameter-transforms.qmd
          - text: "Diagnostics"
            href: learn/diagnostics.qmd
          - text: "Simulation"
            href: learn/simulation.qmd
      - text: "Reference"
        href: reference/index.html
      - text: "Model DSL"
        menu:
          - text: "Overview"
            href: model-dsl/overview.qmd
          - text: "Parameters"
            href: model-dsl/parameters.qmd
          - text: "Structural model"
            href: model-dsl/structural-model.qmd
          - text: "ODE models"
            href: model-dsl/odes.qmd
          - text: "Error model"
            href: model-dsl/error-model.qmd
          - text: "Fit options"
            href: model-dsl/fit-options.qmd
      - text: "ferx-core"
        menu:
          - text: "Overview"
            href: ferx-core/overview.qmd
          - text: "Estimation (FOCE/FOCEI)"
            href: ferx-core/estimation.qmd
          - text: "Autodiff (Enzyme)"
            href: ferx-core/autodiff.qmd
          - text: "ODE solver"
            href: ferx-core/ode-solver.qmd
          - text: "Analytical PK models"
            href: ferx-core/pk-models.qmd
          - text: "Architecture"
            href: ferx-core/architecture.qmd
    right:
      - text: "Changelog"
        href: changelog.qmd
      - icon: github
        href: https://github.com/FeRx-NLME
        aria-label: GitHub

  page-footer:
    background: "#F7F6F3"
    border: true
    left: "© 2026 FeRx-NLME · MIT licensed"
    right: "Fe · 26 · Rx · 2026"

format:
  html:
    theme:
      light: [cosmo, assets/ferx.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    code-link: true
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    mainfont: "IBM Plex Sans"
    monofont: "JetBrains Mono"
