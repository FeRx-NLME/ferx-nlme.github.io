project:
  type: website
  output-dir: _site
  resources:
    - reference/**
    - articles/**

brand: _brand.yml

website:
  title: "ferx"
  description: "Fast nonlinear mixed effects modeling with a Rust backend"
  favicon: assets/ferx-favicon.svg
  site-url: https://ferx-nlme.github.io
  repo-url: https://github.com/FeRx-NLME/ferx-r
  repo-actions: [issue]

  navbar:
    logo: assets/ferx-dsl-brackets.svg
    logo-dark: assets/ferx-dsl-brackets-dark.svg
    logo-alt: "ferx"
    left:
      - text: "Book"
        href: https://ferx-nlme.github.io/ferx-book/
      - text: "Get started"
        href: get-started.qmd
      - text: "Learn"
        menu:
          - text: "Model workflow"
            href: learn/model-workflow.qmd
          - text: "Model editing"
            href: learn/model-editing.qmd
          - text: "Parameter transforms"
            href: learn/parameter-transforms.qmd
          - text: "Diagnostics"
            href: learn/diagnostics.qmd
          - text: "Simulation"
            href: learn/simulation.qmd
      - text: "Model DSL"
        menu:
          - text: "Overview"
            href: model-dsl/overview.qmd
          - text: "Parameters"
            href: model-dsl/parameters.qmd
          - text: "Individual parameters"
            href: model-dsl/individual-parameters.qmd
          - text: "Structural model"
            href: model-dsl/structural-model.qmd
          - text: "ODE models"
            href: model-dsl/odes.qmd
          - text: "Error model"
            href: model-dsl/error-model.qmd
          - text: "Fit options"
            href: model-dsl/fit-options.qmd
      - text: "Examples"
        menu:
          - text: "Covariate model"
            href: examples/covariates.qmd
          - text: "Inter-occasion variability"
            href: examples/iov.qmd
          - text: "BLOQ (M3 method)"
            href: examples/bloq.qmd
          - text: "ODE model (Michaelis-Menten)"
            href: examples/ode-model.qmd
          - text: "Two-compartment IV"
            href: examples/two-cpt-iv.qmd
          - text: "Three-compartment IV"
            href: examples/three-cpt-iv.qmd
          - text: "Absorption lag time"
            href: examples/lag-time.qmd
          - text: "Block omega (correlated ETAs)"
            href: examples/block-omega.qmd
          - text: "Conditional covariate (if/else)"
            href: examples/conditional-covariate.qmd
          - text: "Deep Compartment Model (DCM)"
            href: examples/dcm.qmd
      - text: "ferx-core"
        menu:
          - text: "Overview"
            href: ferx-core/overview.qmd
          - text: "Architecture"
            href: ferx-core/architecture.qmd
          - text: "Data format"
            href: ferx-core/data-format.qmd
          - text: "Estimation (FOCE/FOCEI)"
            href: ferx-core/estimation.qmd
          - text: "Autodiff (Enzyme)"
            href: ferx-core/autodiff.qmd
          - text: "Analytical PK models"
            href: ferx-core/pk-models.qmd
          - text: "ODE solver"
            href: ferx-core/ode-solver.qmd
          - text: "Output reference"
            href: ferx-core/output.qmd
    right:
      - text: "FAQ"
        href: faq.qmd
      - text: "Reference"
        href: reference/index.html
      - text: "Changelog"
        href: changelog.qmd
      - icon: github
        href: https://github.com/FeRx-NLME
        aria-label: GitHub

  page-footer:
    background: light
    border: true
    left: "© 2026 FeRx-NLME · MIT licensed"
    right: "Fe · 26 · Rx · 2026"

format:
  html:
    theme:
      light: [cosmo, assets/ferx.scss]
      dark: [cosmo, assets/ferx-dark.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    code-link: true
    code-copy: true
    code-overflow: wrap
    highlight-style:
      light: github
      dark: github-dark
    mainfont: "IBM Plex Sans"
    monofont: "JetBrains Mono"
