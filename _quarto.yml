project:
  type: website
  output-dir: _site
  resources:
    - reference/**
    - articles/**

brand: _brand.yml

website:
  title: "ferx"
  description: "Fast nonlinear mixed effects modeling with a Rust backend"
  favicon: assets/ferx-favicon.svg
  site-url: https://ferx-nlme.github.io
  repo-url: https://github.com/FeRx-NLME/ferx-r
  repo-actions: [issue]

  navbar:
    logo: assets/ferx-dsl-brackets.svg
    logo-dark: assets/ferx-dsl-brackets-dark.svg
    logo-alt: "ferx"
    left:
      - text: "Get started"
        href: get-started.qmd
      - text: "Learn"
        menu:
          - text: "Model workflow"
            href: learn/model-workflow.qmd
          - text: "Model editing"
            href: learn/model-editing.qmd
          - text: "Parameter transforms"
            href: learn/parameter-transforms.qmd
          - text: "Diagnostics"
            href: learn/diagnostics.qmd
          - text: "Simulation"
            href: learn/simulation.qmd
          - text: "Special features"
            href: learn/special-features.qmd
          - text: "Uncertainty (SIR)"
            href: learn/uncertainty-sir.qmd
          - text: "Method chaining & optimizers"
            href: learn/method-chaining.qmd
          - text: "Robust fitting"
            href: learn/robust-fitting.qmd
      - text: "Model DSL"
        menu:
          - text: "Overview"
            href: model-dsl/overview.qmd
          - text: "Parameters"
            href: model-dsl/parameters.qmd
          - text: "Individual parameters"
            href: model-dsl/individual-parameters.qmd
