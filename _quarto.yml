      - text: "Reference"
        href: reference/index.html
      - text: "FAQ"
        href: faq.qmd
      - text: "Changelog"
        href: changelog.qmd
      - icon: github
        href: https://github.com/FeRx-NLME
        aria-label: GitHub

  page-footer:
    background: light
    border: true
    left: "© 2026 FeRx-NLME · MIT licensed"
    right: "Fe · 26 · Rx · 2026"

format:
  html:
    theme:
      light: [cosmo, assets/ferx.scss]
      dark: [cosmo, assets/ferx-dark.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    code-link: true
    code-copy: true
    code-overflow: wrap
    highlight-style:
      light: github
      dark: github-dark
    mainfont: "IBM Plex Sans"
    monofont: "JetBrains Mono"
