name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::Rd2md
            any::yaml
            any::knitr
            any::rmarkdown

      # Install ferx-r to build pkgdown reference
      - name: Install ferx-r
        run: |
          git clone --depth 1 https://github.com/FeRx-NLME/ferx-r /tmp/ferx-r
          Rscript -e 'pak::local_install("/tmp/ferx-r", ask = FALSE)'

      # Clone ferx-core for its CHANGELOG.md (rendered on the changelog page)
      - name: Clone ferx-core (changelog source)
        run: |
          git clone --depth 1 https://github.com/FeRx-NLME/ferx-core /tmp/ferx-core

      # Generate native Quarto reference pages from ferx-r's Rd man pages.
      # These render with the site theme (cosmo + _brand.yml), unlike pkgdown's
      # separate Bootstrap output. See tools/build_reference.R.
      - name: Build reference pages
        run: Rscript tools/build_reference.R /tmp/ferx-r reference

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
